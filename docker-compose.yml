# ==============================================================================
# Networks
# ==============================================================================
networks:
  lisp-claw-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  lisp-claw-data:
    driver: local
  lisp-claw-logs:
    driver: local
  lisp-claw-plugins:
    driver: local
  lisp-claw-vectors:
    driver: local
  redis-data:
    driver: local
  chroma-data:
    driver: local
