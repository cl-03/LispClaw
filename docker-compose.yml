# Docker Compose for Lisp-Claw
# Provides complete stack with dependencies and optional services

version: '3.8'

services:
  # ==============================================================================
  # Lisp-Claw Main Application
  # ==============================================================================
  lisp-claw:
    build:
      context: .
      dockerfile: Dockerfile
    image: lisp-claw:latest
    container_name: lisp-claw
    restart: unless-stopped
    ports:
      - "18789:18789"  # Gateway WebSocket
      - "18790:18790"  # Control UI
    environment:
      - LISP_CLAW_CONFIG=/app/config/config.json
      - LISP_CLAW_LOG_LEVEL=info
      - LISP_CLAW_DATA_DIR=/app/data
      # AI Provider Configuration
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      # Database Configuration
      - DATABASE_URL=sqlite:///app/data/lisp-claw.db
      # Vector Database (optional)
      - CHROMA_HOST=${CHROMA_HOST:-chromadb}
      - CHROMA_PORT=8000
      # Redis for caching (optional)
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=6379
    volumes:
      - ./config:/app/config:ro
      - lisp-claw-data:/app/data
      - lisp-claw-logs:/app/logs
      - lisp-claw-plugins:/app/plugins
      - lisp-claw-vectors:/app/vector-store
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - lisp-claw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==============================================================================
  # Redis - Caching and Session Storage
  # ==============================================================================
  redis:
    image: redis:7-alpine
    container_name: lisp-claw-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - lisp-claw-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================================================
  # ChromaDB - Vector Database for RAG and Memory
  # ==============================================================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: lisp-claw-chromadb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - CHROMA_WORKSPACE_DIRECTORY=/chroma/chroma
    networks:
      - lisp-claw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

